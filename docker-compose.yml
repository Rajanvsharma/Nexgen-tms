version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexgen_tms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexgen
      POSTGRES_PASSWORD: nexgen_pass
      POSTGRES_DB: nexgen_tms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
